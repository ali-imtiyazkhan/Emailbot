services:
  - type: web
    name: emailbot-api
    env: node
    region: oregon
    buildCommand: npm install && npm run generate -w @repo/db && npx turbo run build --filter=api
    startCommand: npm start -w api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emailbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: emailbot-redis
          property: connectionString
      - key: PORT
        value: 10000

  - type: worker
    name: emailbot-emailreceiver
    env: node
    region: oregon
    buildCommand: npm install && npm run generate -w @repo/db && npx turbo run build --filter=emailreceiver
    startCommand: npm start -w emailreceiver
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emailbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: emailbot-redis
          property: connectionString

  - type: worker
    name: emailbot-whatsappsender
    env: node
    region: oregon
    buildCommand: npm install && npm run generate -w @repo/db && npx turbo run build --filter=whatsappsender
    startCommand: npm start -w whatsappsender
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emailbot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: emailbot-redis
          property: connectionString


  - type: redis
    name: emailbot-redis
    region: oregon
    ipAllowList: []
    plan: free


databases:
  - name: emailbot-db
    databaseName: emailbot
    region: oregon
    plan: free
