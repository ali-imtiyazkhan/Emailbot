services:
  # Consolidated API and Background Workers
  - type: web
    name: emailbot-backend
    env: node
    region: oregon
    plan: free
    # Build all applications in the Turborepo
    buildCommand: npm install && npm run generate -w @repo/db && npx turbo run build
    # Boot the Email Receiver and WhatsApp Sender in the background, then boot the API in the foreground
    startCommand: npm start -w emailreceiver & npm start -w whatsappsender & npm start -w api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emailbot-db   
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: emailbot-redis
          property: connectionString
      - key: PORT
        value: 10000

  # Managed Redis
  - type: redis
    name: emailbot-redis
    region: oregon
    ipAllowList: [] # Empty means internal network only
    plan: free

# Managed PostgreSQL
databases:
  - name: emailbot-db
    databaseName: emailbot
    region: oregon
    plan: free
